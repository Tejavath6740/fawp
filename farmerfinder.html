<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Farmer – FAWP Scheme Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1b5e20;
      --green-mid:   #2e7d32;
      --green-main:  #388e3c;
      --green-light: #4caf50;
      --green-pale:  #e8f5e9;
      --white:       #ffffff;
      --bg:          #f0f4f0;
      --text:        #1a2e1a;
      --text-sub:    #4a6349;
      --border:      #c8e6c9;
      --shadow:      0 4px 24px rgba(27,94,32,0.10);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-main) 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    .header-inner {
      position: relative;
      z-index: 1;
      padding: 32px 40px 24px;
      text-align: center;
    }

    .header-inner .icon { font-size: 44px; display: block; margin-bottom: 10px; }
    .header-inner h1   { font-size: 26px; font-weight: 700; }
    .header-inner p    { font-size: 13px; opacity: 0.8; margin-top: 6px; }

    /* NAV */
    nav {
      background: var(--green-dark);
      padding: 0 20px;
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    nav a:hover { color: white; border-bottom-color: var(--green-light); }

    /* CONTAINER */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* SEARCH & FILTER BAR */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--green-main); }

    .search-box .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .filter-select {
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      outline: none;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .filter-select:focus { border-color: var(--green-main); }

    .results-count {
      font-size: 13px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    /* FARMER CARDS GRID */
    .farmers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .farmer-card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }

    .farmer-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(27,94,32,0.15);
      border-color: var(--green-light);
    }

    .farmer-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(to right, var(--green-light), var(--green-dark));
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 50px; height: 50px;
      background: var(--green-pale);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .farmer-name-block .name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .farmer-name-block .id-tag {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    .category-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .cat-General { background: #e3f2fd; color: #1565c0; }
    .cat-OBC     { background: #fff3e0; color: #e65100; }
    .cat-SC      { background: #f3e5f5; color: #6a1b9a; }
    .cat-ST      { background: #fce4ec; color: #880e4f; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .info-item {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .info-item .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      font-weight: 600;
    }

    .info-item .value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    .crops-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 16px;
    }

    .crop-tag {
      background: var(--green-pale);
      color: var(--green-dark);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .check-btn {
      width: 100%;
      padding: 11px;
      background: var(--green-mid);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .check-btn:hover { background: var(--green-dark); }

    /* FLAGS */
    .flags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

    .flag {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .flag-bpl      { background: #fff3e0; color: #e65100; }
    .flag-irrigated{ background: #e1f5fe; color: #01579b; }
    .flag-loan     { background: #fce4ec; color: #880e4f; }

    /* LOADING / EMPTY */
    .center-msg {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .center-msg .big-icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .center-msg h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .center-msg p  { font-size: 14px; color: var(--text-sub); }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--green-pale);
      border-top-color: var(--green-main);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #e0e0e0;
    }

    @media (max-width: 600px) {
      .farmers-grid { grid-template-columns: 1fr; }
      .toolbar      { flex-direction: column; }
      .search-box   { min-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="icon">👨‍🌾</span>
    <h1>Scheme Finder</h1>
    <p>Select a farmer to check their eligible government schemes</p>
  </div>
</header>

<nav>
  <a href="index.html">🏠 Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="benefits.html">Benefits</a>
  <a href="contact.html">Contact</a>
  <a href="login.html">Login</a>
</nav>

<div class="container">

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, village or state..." oninput="filterFarmers()" />
    </div>
    <select class="filter-select" id="stateFilter" onchange="filterFarmers()">
      <option value="">All States</option>
    </select>
    <select class="filter-select" id="categoryFilter" onchange="filterFarmers()">
      <option value="">All Categories</option>
      <option value="General">General</option>
      <option value="OBC">OBC</option>
      <option value="SC">SC</option>
      <option value="ST">ST</option>
    </select>
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="farmers-grid" id="farmersGrid">
    <div class="center-msg">
      <div class="spinner"></div>
      <h3>Loading farmers...</h3>
      <p>Fetching farmer profiles from database</p>
    </div>
  </div>

</div>

<footer>🌾 FAWP – Digital Farmer Assistance &amp; Welfare Platform</footer>

<script>
  let allFarmers = [];

  function getCategoryEmoji(cat) {
    return { General: '👨‍🌾', OBC: '🧑‍🌾', SC: '👩‍🌾', ST: '🌿' }[cat] || '👨‍🌾';
  }

  function formatIncome(n) {
    if (n >= 100000) return '₹' + (n/100000).toFixed(1) + 'L';
    if (n >= 1000)   return '₹' + (n/1000).toFixed(0) + 'K';
    return '₹' + n;
  }

  function renderCard(f) {
    const crops = Array.isArray(f.crops) ? f.crops : (f.crops ? f.crops.split(',') : []);
    const cropsHtml = crops.slice(0, 4).map(c => `<span class="crop-tag">🌱 ${c.trim()}</span>`).join('');
    const moreHtml  = crops.length > 4 ? `<span class="crop-tag">+${crops.length - 4}</span>` : '';

    const flags = [];
    if (f.bpl)       flags.push(`<span class="flag flag-bpl">BPL</span>`);
    if (f.irrigated) flags.push(`<span class="flag flag-irrigated">💧 Irrigated</span>`);
    if (f.has_loan)  flags.push(`<span class="flag flag-loan">🏦 Has Loan</span>`);

    return `
      <div class="farmer-card" onclick="checkSchemes(${f.id}, '${f.name.replace(/'/g,"\\'")}')">
        <span class="category-badge cat-${f.category}">${f.category}</span>
        <div class="card-header">
          <div class="avatar">${getCategoryEmoji(f.category)}</div>
          <div class="farmer-name-block">
            <div class="name">${f.name}</div>
            <div class="id-tag">ID #${f.id} &nbsp;·&nbsp; ${f.village}</div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="label">📍 State</div>
            <div class="value">${f.state}</div>
          </div>
          <div class="info-item">
            <div class="label">🌾 Land</div>
            <div class="value">${f.land_acres} acres</div>
          </div>
          <div class="info-item">
            <div class="label">💰 Income</div>
            <div class="value">${formatIncome(f.annual_income)}/yr</div>
          </div>
          <div class="info-item">
            <div class="label">🎂 Age</div>
            <div class="value">${f.age} years</div>
          </div>
        </div>

        ${flags.length ? `<div class="flags">${flags.join('')}</div>` : ''}

        ${crops.length ? `<div class="crops-row">${cropsHtml}${moreHtml}</div>` : ''}

        <button class="check-btn">🔍 Check Eligible Schemes</button>
      </div>`;
  }

  function filterFarmers() {
    const search   = document.getElementById('searchInput').value.toLowerCase();
    const state    = document.getElementById('stateFilter').value;
    const category = document.getElementById('categoryFilter').value;

    const filtered = allFarmers.filter(f => {
      const matchSearch = !search ||
        f.name.toLowerCase().includes(search) ||
        f.village.toLowerCase().includes(search) ||
        f.state.toLowerCase().includes(search);
      const matchState    = !state    || f.state === state;
      const matchCategory = !category || f.category === category;
      return matchSearch && matchState && matchCategory;
    });

    document.getElementById('resultsCount').textContent =
      `${filtered.length} of ${allFarmers.length} farmers`;

    const grid = document.getElementById('farmersGrid');
    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="center-msg">
          <span class="big-icon">🔍</span>
          <h3>No farmers found</h3>
          <p>Try adjusting your search or filters</p>
        </div>`;
    } else {
      grid.innerHTML = filtered.map(renderCard).join('');
    }
  }

  function checkSchemes(farmerId, farmerName) {
    localStorage.setItem('farmerId', farmerId);
    localStorage.removeItem('schemeData'); // clear old cache
    // Show loading on the button
    const btn = event.currentTarget.querySelector('.check-btn');
    if (btn) { btn.textContent = '⏳ Loading...'; btn.disabled = true; }

    fetch(`/api/match/${farmerId}`)
      .then(res => { if (!res.ok) throw new Error('Server error'); return res.json(); })
      .then(data => {
        localStorage.setItem('schemeData', JSON.stringify(data));
        window.location.href = 'schemefinder.html';
      })
      .catch(err => {
        console.error(err);
        alert('Could not load schemes. Please ensure the backend is running.');
        if (btn) { btn.textContent = '🔍 Check Eligible Schemes'; btn.disabled = false; }
      });
  }

  // Load all farmers on page load
  fetch('/api/farmers')
    .then(res => { if (!res.ok) throw new Error('Server error'); return res.json(); })
    .then(farmers => {
      allFarmers = farmers;

      // Populate state filter
      const states = [...new Set(farmers.map(f => f.state))].sort();
      const stateFilter = document.getElementById('stateFilter');
      states.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        stateFilter.appendChild(opt);
      });

      filterFarmers();
    })
    .catch(err => {
      console.error(err);
      document.getElementById('farmersGrid').innerHTML = `
        <div class="center-msg">
          <span class="big-icon">⚠️</span>
          <h3>Could not load farmers</h3>
          <p>Please ensure the backend server is running and try again.</p>
        </div>`;
    });
</script>

</body>
</html>
