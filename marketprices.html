<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Prices – FAWP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gd:#1b5e20;--gm:#2e7d32;--g:#388e3c;--gl:#4caf50;--gp:#e8f5e9;
      --red:#c62828;--redp:#ffebee;--blu:#1565c0;--blup:#e3f2fd;
      --amb:#f57f17;--ampp:#fff8e1;--pur:#6a1b9a;--purp:#f3e5f5;
      --wh:#fff;--off:#f4f9f4;--brd:#c8e6c9;
      --txt:#1a2e1a;--txts:#4a6349;--txth:#7a9b79;
      --shd:0 4px 18px rgba(27,94,32,.09);--r:12px
    }
    body{font-family:'Poppins',Arial,sans-serif;background:var(--off);color:var(--txt);min-height:100vh}

    /* HEADER */
    header{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:22px 28px;text-align:center;position:relative;overflow:hidden}
    header::before{content:'🌾🌽🍅🧅🥔🌶️🥭🍌🫘🥜🌿🌸🎋';position:absolute;bottom:4px;left:0;right:0;font-size:18px;opacity:.1;pointer-events:none}
    header h1{font-size:1.7rem;font-weight:800;position:relative}
    header p{font-size:.85rem;opacity:.85;margin-top:4px;position:relative}
    .date-badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 14px;font-size:11px;font-weight:700;margin-top:8px;position:relative}

    /* NAV */
    nav{background:var(--gd);padding:10px;text-align:center}
    nav a{color:#fff;margin:6px 10px;text-decoration:none;font-weight:600;font-size:13px;padding:6px 10px;border-radius:6px;transition:background .2s}
    nav a:hover{background:#43a047}

    /* TOOLBAR */
    .toolbar{background:#fff;border-bottom:1px solid var(--brd);padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .toolbar select,.toolbar input{padding:8px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--off);outline:none;transition:border-color .2s}
    .toolbar select:focus,.toolbar input:focus{border-color:var(--g)}
    .toolbar input{flex:1;min-width:160px}
    .vtog{display:flex;gap:4px}
    .vbtn{padding:7px 12px;border:1.5px solid var(--brd);border-radius:7px;background:var(--off);cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s}
    .vbtn.on{background:var(--gm);border-color:var(--gm);color:#fff}

    /* TABS */
    .tabs{display:flex;background:#fff;border-bottom:2px solid var(--brd);padding:0 24px;overflow-x:auto}
    .tab{padding:10px 14px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--txts);background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
    .tab:hover{color:var(--gd);background:var(--gp)}
    .tab.on{color:var(--gd);border-bottom-color:var(--gm)}

    /* DISTRICT HERO */
    .hero{background:linear-gradient(135deg,var(--gm),var(--g),#8bc34a);border-radius:var(--r);padding:18px 24px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;box-shadow:0 6px 24px rgba(46,125,50,.22);margin-bottom:18px}
    .hero h2{font-size:1.3rem;font-weight:800}
    .hero p{font-size:12px;opacity:.85;margin-top:3px}
    .hstats{display:flex;gap:10px;flex-wrap:wrap}
    .hs{background:rgba(255,255,255,.18);border-radius:8px;padding:8px 14px;text-align:center;min-width:76px}
    .hs .v{font-size:1.15rem;font-weight:800;display:block}
    .hs .l{font-size:10px;opacity:.85;text-transform:uppercase;letter-spacing:.5px}

    /* STAT STRIP */
    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:18px}
    .sc{background:#fff;border-radius:var(--r);box-shadow:var(--shd);padding:12px 14px;border-top:3px solid var(--gm)}
    .sc .sv{font-size:1.25rem;font-weight:800;color:var(--gd)}
    .sc .sl{font-size:11px;color:var(--txth);margin-top:2px}

    /* RESULT INFO */
    .ri{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .ri-txt{font-size:13px;color:var(--txts)}
    .ri-txt strong{color:var(--gd)}
    .srow{display:flex;gap:8px;align-items:center;font-size:12px;flex-wrap:wrap}
    .srow select{padding:5px 10px;font-size:12px;border:1px solid var(--brd);border-radius:6px;font-family:inherit;outline:none;background:var(--off)}
    .dbtn{padding:5px 10px;border:1px solid var(--brd);border-radius:6px;cursor:pointer;font-size:12px;background:var(--off);font-family:inherit}

    /* TABLE */
    .twrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--shd)}
    .ptable{width:100%;border-collapse:collapse;background:#fff}
    .ptable thead th{background:var(--gm);color:#fff;padding:10px 12px;font-size:12px;font-weight:700;text-align:left;white-space:nowrap;cursor:pointer}
    .ptable thead th:hover{background:var(--gd)}
    .ptable tbody tr{border-bottom:1px solid #f0f7f0;transition:background .12s}
    .ptable tbody tr:hover{background:#f6fdf6}
    .ptable td{padding:9px 12px;font-size:13px;vertical-align:middle}
    .tmod{font-weight:800;color:var(--gd);font-size:14px}
    .tmin{color:var(--red);font-weight:600}
    .tmax{color:var(--blu);font-weight:600}
    .tmsp{font-size:12px}
    .up{color:var(--gl);font-weight:700}
    .dn{color:var(--red);font-weight:700}
    .fl{color:var(--txth);font-weight:700}
    .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;white-space:nowrap}
    .bc{background:var(--gp);color:var(--gd)}
    .bv{background:var(--blup);color:var(--blu)}
    .bf{background:#fff3e0;color:#e65100}
    .bp{background:#e8eaf6;color:#283593}
    .bo{background:var(--purp);color:var(--pur)}
    .bs{background:#fce4ec;color:#c2185b}
    .bk{background:var(--ampp);color:var(--amb)}

    /* CARDS */
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .pcard{background:#fff;border-radius:var(--r);box-shadow:var(--shd);padding:14px;border-top:3px solid var(--gm);animation:fadeUp .3s ease both;transition:transform .2s,box-shadow .2s}
    .pcard:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(27,94,32,.13)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .pe{font-size:2.2rem;display:block;margin-bottom:4px}
    .pn{font-size:.9rem;font-weight:800}
    .pv{font-size:10px;color:var(--txth);margin-bottom:8px}
    .pm{font-size:1.3rem;font-weight:800;color:var(--gd);margin:6px 0}
    .pm small{font-size:11px;font-weight:400;color:var(--txts)}
    .pr{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-top:1px dashed #eee}
    .pk{color:var(--txts)}
    .ptag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:6px}
    .tup{background:var(--gp);color:var(--gd)}
    .tdn{background:var(--redp);color:var(--red)}
    .tfl{background:#f5f5f5;color:#666}

    /* MAIN */
    .main{padding:20px 24px 60px}

    footer{text-align:center;padding:16px;font-size:12px;color:var(--txth);border-top:1px solid var(--brd);background:#fff;margin-top:10px}
  </style>
</head>

</div>

<div class="main">

// ══════════ STATE / UI ══════════
let cur = {state:'Telangana', district:'Nalgonda'};
let tab = '', view = 't', srt = 'modal', sdir = -1;
let data = [], filt = [];

// category badge classes
const BC = {Cereal:'bc',Vegetable:'bv',Fruit:'bf',Pulse:'bp',Oilseed:'bo',Spice:'bs','Cash Crop':'bk'};
const BE = {Cereal:'🌾',Vegetable:'🥕',Fruit:'🍎',Pulse:'🫘',Oilseed:'🫙',Spice:'🌶️','Cash Crop':'💰'};

// ══════════ INIT ══════════
function onState() {
  cur.state = document.getElementById('stSel').value;
  const dd = document.getElementById('dtSel');
  dd.innerHTML = SD[cur.state].map(d=>`<option value="${d}">${d}</option>`).join('');
  cur.district = SD[cur.state][0];
  load();
}

function onDistrict() {
  cur.district = document.getElementById('dtSel').value;
  load();
}

function load() {
  const f = DF[cur.district] || {};
  // deterministic seed per district
  const seed = [...cur.district].reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng = i => { const x=Math.sin(seed*9301+i*49297+233)*10000; return x-Math.floor(x); };

  data = CROPS.map((c,i) => {
    const factor = f[c.id] || 1.0;
    const modal  = Math.round(c.bm * factor);
    const sp     = 0.08 + rng(i)*0.10;
    const half   = Math.round(modal * sp / 2);
    const min    = Math.max(modal - half - Math.round(rng(i+50)*half*.4), Math.round(modal*.78));
    const max    = modal + half + Math.round(rng(i+100)*half*.4);
    const t      = rng(i+200);
    const trend  = t>.6?'up':t>.3?'flat':'down';
    const tpct   = (1+Math.round(rng(i+300)*8)).toFixed(1);
    return {...c, modal, min, max, trend, tpct};
  });

  buildHero(); buildStats(); filter();
}

function buildHero() {
  const avg = Math.round(data.reduce((s,c)=>s+c.modal,0)/data.length);
  const hi  = data.reduce((a,b)=>b.modal>a.modal?b:a);
  const lo  = data.reduce((a,b)=>b.modal<a.modal?b:a);
  document.getElementById('hero').innerHTML = `
    <div class="hero">
      <div>
        <h2>📍 ${cur.district}, ${cur.state}</h2>
        <p>Crop market prices · ${TODAY.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div class="hstats">
        <div class="hs"><span class="v">20</span><span class="l">Crops</span></div>
        <div class="hs"><span class="v">₹${avg.toLocaleString('en-IN')}</span><span class="l">Avg Modal</span></div>
        <div class="hs"><span class="v">${hi.e}</span><span class="l">${hi.name.split(' ')[0]}<br>Highest</span></div>
        <div class="hs"><span class="v">${lo.e}</span><span class="l">${lo.name.split(' ')[0]}<br>Lowest</span></div>
      </div>
    </div>`;
}

function buildStats() {
  const up   = data.filter(c=>c.trend==='up').length;
  const dn   = data.filter(c=>c.trend==='down').length;
  const msp  = data.filter(c=>c.msp).length;
  const low  = data.filter(c=>c.msp&&c.modal<c.msp).length;
  document.getElementById('stats').innerHTML = `
    <div class="sc"><div class="sv">20</div><div class="sl">Total Crops</div></div>
    <div class="sc"><div class="sv" style="color:var(--gl)">▲ ${up}</div><div class="sl">Rising</div></div>
    <div class="sc"><div class="sv" style="color:var(--red)">▼ ${dn}</div><div class="sl">Falling</div></div>
    <div class="sc"><div class="sv">${msp}</div><div class="sl">Have MSP</div></div>
    <div class="sc"><div class="sv" style="color:var(--red)">${low}</div><div class="sl">Below MSP</div></div>`;
}

function filter() {
  const s  = document.getElementById('srch').value.toLowerCase();
  const ct = document.getElementById('catSel').value || tab;
  filt = data.filter(c=>{
    const cm = !ct || c.cat===ct;
    const sm = !s  || c.name.toLowerCase().includes(s);
    return cm && sm;
  });
  filt.sort((a,b)=>{
    if(srt==='name')  return sdir*a.name.localeCompare(b.name);
    if(srt==='modal') return sdir*(a.modal-b.modal);
    if(srt==='min')   return sdir*(a.min-b.min);
    if(srt==='max')   return sdir*(a.max-b.max);
    if(srt==='msp')   return sdir*((a.msp||0)-(b.msp||0));
    return 0;
  });
  renderRI(); renderPC();
}

function renderRI() {
  document.getElementById('ri').innerHTML = `
    <div class="ri-txt">Showing <strong>${filt.length}</strong> of <strong>${data.length}</strong> crops</div>
    <div class="srow">
      Sort:
      <select onchange="srt=this.value;filter()">
        <option value="modal" ${srt==='modal'?'selected':''}>Modal Price</option>
        <option value="min"   ${srt==='min'  ?'selected':''}>Min Price</option>
        <option value="max"   ${srt==='max'  ?'selected':''}>Max Price</option>
        <option value="name"  ${srt==='name' ?'selected':''}>Name A–Z</option>
        <option value="msp"   ${srt==='msp'  ?'selected':''}>MSP</option>
      </select>
      <button class="dbtn" onclick="sdir*=-1;filter()">${sdir===-1?'↓ High→Low':'↑ Low→High'}</button>
    </div>`;
}

function renderPC() {
  document.getElementById('pc').innerHTML = filt.length===0
    ? '<div style="text-align:center;padding:50px;color:var(--txth)">No crops match filter.</div>'
    : view==='t' ? renderTable() : renderCards();
}

function renderTable() {
  const th=(col,lbl)=>`<th onclick="srt='${col}';filter()">${lbl}${srt===col?(sdir===-1?' ↓':' ↑'):''}</th>`;
  return `<div class="twrap"><table class="ptable">
    <thead><tr>
      <th>#</th><th>Crop</th>
      ${th('modal','Modal ₹/qtl')}
      ${th('min','Min ₹')}
      ${th('max','Max ₹')}
      ${th('msp','MSP ₹')}
      <th>Trend</th>
      <th>Category</th>
      <th>Variety</th>
      <th>Market</th>
    </tr></thead>
    <tbody>${filt.map((c,i)=>{
      const mspT = c.msp?`₹${c.msp.toLocaleString('en-IN')}`:'—';
      const belowMSP = c.msp && c.modal < c.msp;
      const tCls = c.trend==='up'?'up':c.trend==='down'?'dn':'fl';
      const tIco = c.trend==='up'?'▲':c.trend==='down'?'▼':'—';
      return `<tr>
        <td style="font-size:11px;color:var(--txth)">${i+1}</td>
        <td style="white-space:nowrap"><span style="font-size:1.3rem">${c.e}</span> <strong>${c.name}</strong></td>
        <td class="tmod">₹${c.modal.toLocaleString('en-IN')}</td>
        <td class="tmin">₹${c.min.toLocaleString('en-IN')}</td>
        <td class="tmax">₹${c.max.toLocaleString('en-IN')}</td>
        <td class="tmsp" style="${belowMSP?'color:var(--red);font-weight:700':''}">
          ${mspT}${belowMSP?'<br><span style="font-size:10px">⚠ Below MSP</span>':''}
        </td>
        <td class="${tCls}">${tIco} ${c.tpct}%</td>
        <td><span class="badge ${BC[c.cat]||'bc'}">${BE[c.cat]||'🌿'} ${c.cat}</span></td>
        <td style="font-size:11px;color:var(--txth);max-width:160px">${c.var}</td>
        <td style="font-size:11px;color:var(--txts)">${c.mkt}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderCards() {
  return `<div class="pgrid">${filt.map((c,i)=>{
    const belowMSP = c.msp && c.modal < c.msp;
    const tClass = 't'+c.trend;
    const tIco   = c.trend==='up'?'▲':c.trend==='down'?'▼':'—';
    return `<div class="pcard" style="animation-delay:${i*.04}s">
      <span class="pe">${c.e}</span>
      <div class="pn">${c.name}</div>
      <div class="pv">${c.var}</div>
      <span class="badge ${BC[c.cat]||'bc'}" style="margin-bottom:6px">${BE[c.cat]||'🌿'} ${c.cat}</span>
      <div class="pm">₹${c.modal.toLocaleString('en-IN')} <small>/qtl</small></div>
      <div class="pr"><span class="pk">Min</span><span class="tmin">₹${c.min.toLocaleString('en-IN')}</span></div>
      <div class="pr"><span class="pk">Max</span><span class="tmax">₹${c.max.toLocaleString('en-IN')}</span></div>
      <div class="pr"><span class="pk">MSP</span><span style="${belowMSP?'color:var(--red);font-weight:700':''}">${c.msp?'₹'+c.msp.toLocaleString('en-IN'):'—'}</span></div>
      <div class="pr"><span class="pk">Market</span><span style="font-size:11px;color:var(--txts)">${c.mkt}</span></div>
      ${belowMSP?'<div style="font-size:10px;color:var(--red);font-weight:700;margin-top:4px">⚠ Below MSP</div>':''}
      <span class="ptag ${tClass}">${tIco} ${c.tpct}%</span>
    </div>`;
  }).join('')}</div>`;
}

function setV(v) {
  view=v;
  document.getElementById('vt').classList.toggle('on',v==='t');
  document.getElementById('vg').classList.toggle('on',v==='g');
  renderPC();
}

function setTab(t,btn) {
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('catSel').value=t;
  filter();
}

// ══════════ BOOT — populate districts and load Nalgonda immediately ══════════
(function boot(){
  const dd = document.getElementById('dtSel');
  SD['Telangana'].forEach(d=>{
    const o=document.createElement('option');
    o.value=o.textContent=d;
    dd.appendChild(o);
  });
  load(); // ← loads Nalgonda prices immediately on page open
})();
</script>
